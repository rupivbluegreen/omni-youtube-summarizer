name: Feature request
description: Suggest an improvement or new capability
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Focus on the user-visible need, not the implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: How would it work from the user's point of view?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This doesn't require adding `<all_urls>`, `tabs`, or `scripting` permissions.
        - label: This doesn't require a backend server.
        - label: This doesn't add analytics or telemetry.
