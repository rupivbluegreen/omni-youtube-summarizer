name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build zip and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('extension/manifest.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi
          echo "VERSION=$MANIFEST_VERSION" >> "$GITHUB_ENV"

      - name: Build extension zip
        run: |
          cd extension
          zip -r "../omni-youtube-summarizer-v${VERSION}.zip" . \
            -x '.DS_Store' -x '*.bak'
          cd ..
          ls -lh "omni-youtube-summarizer-v${VERSION}.zip"

      - name: Extract changelog entry
        run: |
          python3 - <<'PY' > release-notes.md
          import re, os
          version = os.environ['VERSION']
          src = open('CHANGELOG.md').read()
          pattern = rf'##\s*\[{re.escape(version)}\][^\n]*\n(.*?)(?=\n##\s|\Z)'
          m = re.search(pattern, src, re.S)
          body = (m.group(1).strip() if m else f'See CHANGELOG.md for v{version} notes.')
          print(body)
          PY
          echo '--- release-notes.md ---'
          cat release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "omni-youtube-summarizer-v${VERSION}.zip" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
